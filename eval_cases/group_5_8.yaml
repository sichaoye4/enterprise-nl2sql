  - case_id: paid_gmv_by_campaign_join
    question: "show paid GMV by campaign"
    domain: commerce
    difficulty: hard
    expected_semantic_plan:
      metric: paid_gmv
      dimension: campaign
      time_range: null
      time_semantics: payment_date
      domain: commerce
      filters: []
      requires_clarification: false
    gold_sql: "SELECT campaign_name AS campaign, SUM(paid_gmv_amt) AS paid_gmv FROM ads_order_channel_daily JOIN ads_campaign_daily ON ads_order_channel_daily.campaign_id = ads_campaign_daily.campaign_id WHERE payment_dt IS NOT NULL GROUP BY campaign_name ORDER BY paid_gmv DESC"
    required_tables: [ads_order_channel_daily, ads_campaign_daily]
    required_columns: [campaign_name, paid_gmv_amt, payment_dt]
    active: true
    tags: [join, hard, commerce]
    created_at: "2026-05-29T00:00:00+00:00"

  - case_id: conversion_rate_by_campaign
    question: "show conversion rate by campaign"
    domain: commerce
    difficulty: hard
    expected_semantic_plan:
      metric: conversion_rate
      dimension: campaign
      time_range: null
      time_semantics: null
      domain: commerce
      filters: []
      requires_clarification: false
    gold_sql: "SELECT campaign_name AS campaign, paid_order_count / nullif(click_count, 0) AS conversion_rate FROM ads_marketing_daily WHERE dt IS NOT NULL GROUP BY campaign_name ORDER BY conversion_rate DESC"
    required_tables: [ads_marketing_daily]
    required_columns: [campaign_name, paid_order_count, click_count, dt]
    active: true
    tags: [join, hard, ratio, commerce]
    created_at: "2026-05-29T00:00:00+00:00"

