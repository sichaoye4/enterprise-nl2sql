      Body:
        type: "TEXT"
        inferred_type: "text"
        inferred_meaning: "Text value representing body"
        sample_values: ["\n\n<p>If I have understood correctly, then the problem is to find a probability distribution for the time at which the first run of $n$ or more heads ends.</p>\n\n<p><em>Edit</em> The probabilities can be determined accurately and quickly using matrix multiplication, and it is also possible to analytically compute the mean as $\\\\mu_-=2^{n+1}-1$ and the variance as $\\\\sigma^2=2^{n+2}\\\\left(\\\\mu-n-3\\\\right) -\\\\mu^2 + 5\\\\mu$ where $\\\\mu=\\\\mu_-+1$, but there is probably not a simple closed form for the distribution itself. Above a certain number of coin flips the distribution is essentially a geometric distribution: it would make sense to use this form for larger $t$. </p>\n\n<p>The evolution in time of the probability distribution in state space can be modelled using a transition matrix for $k=n+2$ states, where $n=$ the number of consecutive coin flips. The states are as follows:</p>\n\n<ul>\n<li>State $H_0$, no heads</li>\n<li>State $H_i$, $i$ heads, $1\\\\le i\\\\le(n-1)$</li>\n<li>State $H_n$, $n$ or more heads</li>\n<li>State $H_*$, $n$ or more heads followed by a tail</li>\n</ul>\n\n<p>Once you get into state $H_*$ you can't get back to any of the other states.</p>\n\n<p>The state transition probabilities to get into the states are as follows</p>\n\n<ul>\n<li>State $H_0$: probability $\\\\frac12$ from $H_i$, $i=0,\\\\ldots,n-1$, i.e. including itself but not state $H_n$</li>\n<li>State $H_i$: probability $\\\\frac12$ from $H_{i-1}$</li>\n<li>State $H_n$: probability $\\\\frac12$ from $H_{n-1},H_n$, i.e. from the state with $n-1$ heads and itself</li>\n<li>State $H_*$: probability $\\\\frac12$ from $H_n$ and probability 1 from $H_*$ (itself)</li>\n</ul>\n\n<p>So for example, for $n=4$, this gives the transition matrix</p>\n\n<p>$$ X = \\\\left\\\\{\n\\\\begin{array}{c|cccccc}\n&amp; H_0 &amp; H_1 &amp; H_2 &amp; H_3 &amp; H_4 &amp; H_*  \\\\\\\\\n\\\\hline\nH_0 &amp; \\\\frac12 &amp; \\\\frac12&amp; \\\\frac12&amp; \\\\frac12 &amp;0 &amp; 0 \\\\\\\\ \nH_1 &amp;  \\\\frac12 &amp;0 &amp; 0 &amp;0 &amp; 0 &amp; 0 \\\\\\\\\nH_2 &amp; 0 &amp; \\\\frac12 &amp;0 &amp;0 &amp; 0 &amp; 0 \\\\\\\\\nH_3 &amp; 0 &amp; 0 &amp;\\\\frac12 &amp;0 &amp; 0 &amp; 0 \\\\\\\\\nH_4 &amp; 0 &amp; 0 &amp;0 &amp;\\\\frac12 &amp; \\\\frac12 &amp; 0 \\\\\\\\\nH_* &amp; 0 &amp; 0 &amp; 0&amp;0 &amp;\\\\frac12 &amp; 1\n\\\\end{array}\\\\right\\\\}\n$$</p>\n\n<p>For the case $n=4$, the initial vector of probabilities $\\\\mathbf{p}$ is $\\\\mathbf{p}=(1,0,0,0,0,0)$. In general the initial vector has\n$$\\\\mathbf{p}_i=\\\\begin{cases}1&amp;i=0\\\\\\\\0&amp;i&gt;0\\\\end{cases}$$</p>\n\n<p>The vector $\\\\mathbf{p}$ is the probability distribution in <em>space</em> for any given time. The required cdf is a cdf in <em>time</em>, and is the probability of having seen at least $n$ coin flips end by time $t$. It can be written as $(X^{t+1}\\\\mathbf{p})_k$, noting that we reach state $H_*$ 1 timestep after the last in the run of consecutive coin flips.</p>\n\n<p>The required pmf in time can be written as $(X^{t+1}\\\\mathbf{p})_k - (X^{t}\\\\mathbf{p})_k$. However numerically this involves taking away a very small number from a much larger number ($\\\\approx 1$) and restricts precision. Therefore in calculations it is better to set $X_{k,k}=0$ rather than 1. Then writing $X'$ for the resulting matrix $X'=X|X_{k,k}=0$, the pmf is $(X'^{t+1}\\\\mathbf{p})_k$. This is what is implemented in the simple R program below, which works for any $n\\\\ge 2$,</p>\n\n<pre class=\"lang-R prettyprint-override\"><code>n=4\nk=n+2\nX=matrix(c(rep(1,n),0,0, # first row\n           rep(c(1,rep(0,k)),n-2), # to half-way thru penultimate row\n           1,rep(0,k),1,1,rep(0,k-1),1,0), # replace 0 by 2 for cdf\n         byrow=T,nrow=k)/2\nX\n\nt=10000\npt=rep(0,t) # probability at time t\npv=c(1,rep(0,k-1)) # probability vector\nfor(i in 1:(t+1)) {\n  #pvk=pv[k]; # if calculating via cdf\n  pv = X %*% pv;\n  #pt[i-1]=pv[k]-pvk # if calculating via cdf\n  pt[i-1]=pv[k] # if calculating pmf\n}\n\nm=sum((1:t)*pt)\nv=sum((1:t)^2*pt)-m^2\nc(m, v)\n\npar(mfrow=c(3,1))\nplot(pt[1:100],type=\"l\")\nplot(pt[10:110],type=\"l\")\nplot(pt[1010:1110],type=\"l\")\n</code></pre>\n\n<p>The upper plot shows the pmf between 0 and 100. The lower two plots show the pmf between 10 and 110 and also between 1010 and 1110, illustrating the self-similarity and the fact that as @Glen_b says, the distribution looks like it can be approximated by a geometric distribution after a settling down period.</p>\n\n<p><img src=\"http://i.stack.imgur.com/PDGte.jpg\" alt=\"enter image description here\"></p>\n\n<p>It's possible to investigate this behaviour further using an eigenvector decomposition of $X$. Doing so shows that the for sufficiently large $t$, $p_{t+1}\\\\approx c(n)p_t$, where $c(n)$ is the solution of the equation $2^{n+1}c^n(c-1)+1=0$. This approximation gets better with increasing $n$ and is excellent for $t$ in the range from about 30 to 50, depending on the value of $n$, as shown in the plot of log error below for computing $p_{100}$ (rainbow colours, red on the left for $n=2$). (In fact for numerical reasons, it would actually be better to use the geometric approximation for probabilities when $t$ is larger.)</p>\n\n<p><img src=\"http://i.stack.imgur.com/BXsuQ.jpg\" alt=\"enter image description here\"></p>\n\n<p>I suspect(ed) there might be a closed form available for the distribution because the means and variances as I have calculated them as follows</p>\n\n<p>$$\n\\\\begin{array}{r|rr}\nn &amp; \\\\text{Mean} &amp; \\\\text{Variance} \\\\\\\\\n\\\\hline\n2 &amp;7&amp;  24&amp; \\\\\\\\\n3 &amp;15&amp;  144&amp; \\\\\\\\\n4 &amp;31&amp;  736&amp; \\\\\\\\\n5 &amp;63&amp;  3392&amp; \\\\\\\\\n6 &amp;127&amp;  14720&amp; \\\\\\\\\n7 &amp;255&amp;  61696&amp; \\\\\\\\\n8 &amp;511&amp;  253440&amp; \\\\\\\\\n9 &amp;1023&amp;  1029120&amp; \\\\\\\\\n10&amp;2047&amp;  4151296&amp; \\\\\\\\\n\\\\end{array}\n$$</p>\n\n<p>(I had to bump up the number up the time horizon to <code>t=100000</code> to get this but the program still ran for all $n=2,\\\\ldots,10$ in less than about 10 seconds.) The means in particular follow a very obvious pattern; the variances less so. I have solved a simpler, 3-state transition system in the past, but so far I'm having no luck with a simple analytic solution to this one. Perhaps there's some useful theory that I'm not aware of, e.g. relating to transition matrices.</p>\n\n<p><em>Edit</em>: after a lot of false starts I came up with a recurrence formula. Let $p_{i,t}$ be the probability of being in state $H_i$ at time $t$. Let $q_{*,t}$ be the cumulative probability of being in state $H_*$, i.e. the final state, at time $t$. NB</p>\n\n<ul>\n<li>For any given $t$, $p_{i,t}, 0\\\\le i\\\\le n$ and $q_{*,t}$ are a probability distribution over space $i$ , and immediately below I use the fact that their probabilities add to 1.</li>\n<li>$p_{*,t}$ form a probability distribution over time $t$. Later, I use this fact in deriving the means and variances.</li>\n</ul>\n\n<p>The probability of being at the first state at time $t+1$, i.e. no heads, is given by the transition probabilities from states that can return to it from time $t$ (using the theorem of total probability).\n\\\\begin{align}\np_{0,t+1}\n&amp;= \\\\frac12p_{0,t} + \\\\frac12p_{1,t} + \\\\ldots \\\\frac12p_{n-1,t}\\\\\\\\\n&amp;= \\\\frac12\\\\sum_{i=0}^{n-1}p_{i,t}\\\\\\\\\n&amp;= \\\\frac12\\\\left( 1-p_{n,t}-q_{*,t} \\\\right)\n\\\\end{align}\nBut to get from state $H_0$ to $H_{n-1}$ takes $n-1$ steps, hence $p_{n-1,t+n-1} = \\\\frac1{2^{n-1}}p_{0,t}$ and\n$$ p_{n-1,t+n} = \\\\frac1{2^n}\\\\left( 1-p_{n,t}-q_{*,t} \\\\right)$$\nOnce again by the theorem of total probability the probability of being at state $H_n$ at time $t+1$ is\n\\\\begin{align}\np_{n,t+1}\n&amp;= \\\\frac12p_{n,t} + \\\\frac12p_{n-1,t}\\\\\\\\\n&amp;= \\\\frac12p_{n,t} +  \\\\frac1{2^{n+1}}\\\\left( 1-p_{n,t-n}-q_{*,t-n} \\\\right)\\\\;\\\\;\\\\;(\\\\dagger)\\\\\\\\\n\\\\end{align}\nand using the fact that $q_{*,t+1}-q_{*,t}=\\\\frac12p_{n,t} \\\\implies p_{n,t} = 2q_{*,t+1}-2q_{*,t}$,\n\\\\begin{align}\n2q_{*,t+2} - 2q_{*,t+1} &amp;= q_{*,t+1}-q_{*,t}+\\\\frac1{2^{n+1}}\\\\left( 1-2q_{*,t-n+1}+q_{*,t-n} \\\\right)\n\\\\end{align}\nHence, changing $t\\\\to t+n$,\n$$2q_{*,t+n+2} - 3q_{*,t+n+1} +q_{*,t+n} + \\\\frac1{2^n}q_{*,t+1} - \\\\frac1{2^{n+1}}q_{*,t} - \\\\frac1{2^{n+1}} = 0$$</p>\n\n<p>This recurrence formula checks out for the cases $n=4$ and $n=6$. E.g. for $n=6$ a plot of this formula using <code>t=1:994;v=2*q[t+8]-3*q[t+7]+q[t+6]+q[t+1]/2**6-q[t]/2**7-1/2**7</code> gives machine order accuracy.</p>\n\n<p><img src=\"http://i.stack.imgur.com/5Ijxm.jpg\" alt=\"enter image description here\"></p>\n\n<p><em>Edit</em> I can't see where to go to find a closed form from this recurrence relation. However, it <em>is</em> possible to get a closed form for the mean.</p>\n\n<p>Starting from $(\\\\dagger)$, and noting that $p_{*,t+1}=\\\\frac12p_{n,t}$,\n\\\\begin{align}\np_{n,t+1}\n&amp;= \\\\frac12p_{n,t} +  \\\\frac1{2^{n+1}}\\\\left( 1-p_{n,t-n}-q_{*,t-n} \\\\right)\\\\;\\\\;\\\\;(\\\\dagger)\\\\\\\\\n2^{n+1}\\\\left(2p_{*,t+n+2}-p_{*,t+n+1}\\\\right)+2p_{*,t+1}\n&amp;= 1-q_{*,t}\n\\\\end{align}\nTaking sums from $t=0$ to $\\\\infty$ and applying the formula for the mean $E[X] = \\\\sum_{x=0}^\\\\infty (1-F(x))$ and noting that $p_{*,t}$ is a probability distribution gives\n\\\\begin{align}\n2^{n+1}\\\\sum_{t=0}^\\\\infty \\\\left(2p_{*,t+n+2}-p_{*,t+n+1}\\\\right) + 2\\\\sum_{t=0}^\\\\infty p_{*,t+1} &amp;= \\\\sum_{t=0}^\\\\infty(1-q_{*,t}) \\\\\\\\\n2^{n+1} \\\\left(2\\\\left(1-\\\\frac1{2^{n+1}}\\\\right)-\\\\;1\\\\;\\\\right) + 2 &amp;= \\\\mu \\\\\\\\\n2^{n+1} &amp;= \\\\mu\n\\\\end{align}\nThis is the mean for reaching state $H_*$; the mean for the end of the run of heads is one less than this.</p>\n\n<p><em>Edit</em> A similar approach using the formula $E[X^2] = \\\\sum_{x=0}^\\\\infty (2x+1)(1-F(x))\\\\;$ <a href=\"http://math.stackexchange.com/questions/684279/is-there-a-convenient-formula-for-variance-of-discrete-random-variable-in-terms\">from this question</a> yields the variance.\n\\\\begin{align}\n\\\\sum_{t=0}^\\\\infty(2t+1)\\\\left (2^{n+1}\\\\left(2p_{*,t+n+2}-p_{*,t+n+1}\\\\right) + 2 p_{*,t+1}\\\\right) &amp;= \\\\sum_{t=0}^\\\\infty(2t+1)(1-q_{*,t}) \\\\\\\\\n2\\\\sum_{t=0}^\\\\infty t\\\\left (2^{n+1}\\\\left(2p_{*,t+n+2}-p_{*,t+n+1}\\\\right) + 2 p_{*,t+1}\\\\right) + \\\\mu &amp;= \\\\sigma^2 + \\\\mu^2 \\\\\\\\\n2^{n+2}\\\\left(2\\\\left(\\\\mu-(n+2)+\\\\frac1{2^{n+1}}\\\\right)-(\\\\mu-(n+1))\\\\right) + 4(\\\\mu-1) &amp;\\\\\\\\+ \\\\mu &amp;= \\\\sigma^2 + \\\\mu^2 \\\\\\\\\n2^{n+2}\\\\left(2(\\\\mu-(n+2))-(\\\\mu-(n+1))\\\\right) + 5\\\\mu &amp;= \\\\sigma^2 + \\\\mu^2 \\\\\\\\\n2^{n+2}\\\\left(\\\\mu-n-3\\\\right) + 5\\\\mu &amp;= \\\\sigma^2 + \\\\mu^2 \\\\\\\\\n2^{n+2}\\\\left(\\\\mu-n-3\\\\right) -\\\\mu^2 + 5\\\\mu &amp;= \\\\sigma^2\n\\\\end{align}</p>\n\n<p>The means and variances can easily be generated programmatically. E.g. to check the means and variances from the table above use</p>\n\n<pre class=\"lang-R prettyprint-override\"><code>n=2:10\nm=c(0,2**(n+1))\nv=2**(n+2)*(m[n]-n-3) + 5*m[n] - m[n]^2\n</code></pre>\n\n<p>Finally, I'm not sure what you wanted when you wrote</p>\n\n<blockquote>\n  <p>when a tails hits and breaks the streak of heads the count would start again from the next flip.</p>\n</blockquote>\n\n<p>If you meant what is the probability distribution for the <em>next</em> time at which the first run of $n$ or more heads ends, then the crucial point is contained in this <a href=\"http://stats.stackexchange.com/questions/56134/a-serious-in-depth-problem-of-probabilities-for-flipping-coins#comment109615_56200\">comment by @Glen_b</a>, which is that the process begins again <em>after one tail</em> (c.f. the initial problem where you could get a run of $n$ or more heads immediately).</p>\n\n<p>This means that, for example, the mean time to the first event is $\\\\mu-1$, but the mean time between events is always $\\\\mu+1$ (the variance is the same). It's also possible to use a transition matrix to investigate the long-term probabilities of being in a state after the system has \"settled down\". To get the appropriate transition matrix, set $X_{k,k,}=0$ and $X_{1,k}=1$ so that the system return immediately to state $H_0$ from state $H_*$. Then the <a href=\"http://en.wikipedia.org/wiki/Markov_chain#Stationary_distribution_relation_to_eigenvectors_and_simplexes\" rel=\"nofollow\">scaled first eigenvector of this new matrix gives the stationary probabilities</a>. With $n=4$ these stationary probabilities are</p>\n\n<p>$$\n\\\\begin{array}{c|cccccc}\n&amp; \\\\text{probability}  \\\\\\\\\n\\\\hline\nH_0 &amp; 0.48484848 \\\\\\\\ \nH_1 &amp; 0.24242424 \\\\\\\\\nH_2 &amp; 0.12121212 \\\\\\\\\nH_3 &amp; 0.06060606 \\\\\\\\\nH_4 &amp; 0.06060606 \\\\\\\\\nH_* &amp; 0.03030303\n\\\\end{array}\n$$\nThe expected time between states is given by the reciprocal of the probability. So the expected time between visits to $H_* = 1/0.03030303 = 33 = \\\\mu + 1$.</p>\n\n<p><em>Appendix</em>: Python program used to generate exact probabilities for <code>n</code> = number of consecutive heads over <code>N</code> tosses.</p>\n\n<pre class=\"lang-R prettyprint-override\"><code>import itertools, pylab\n\ndef countinlist(n, N):\n    count = [0] * N\n    sub = 'h'*n+'t'\n    for string in itertools.imap(''.join, itertools.product('ht', repeat=N+1)):\n        f = string.find(sub)\n        if (f&gt;=0):\n            f = f + n -1 # don't count t, and index in count from zero \n            count[f] = count[f] +1\n            # uncomment the following line to print all matches\n            # print \"found at\", f+1, \"in\", string\n    return count, 1/float((2**(N+1)))\n\nn = 4\nN = 24\ncounts, probperevent = countinlist(n,N)\nprobs = [count*probperevent for count in counts]\n\nfor i in range(N):\n    print '{0:2d} {1:.10f}'.format(i+1,probs[i]) \npylab.title('Probabilities of getting {0} consecutive heads in {1} tosses'.format(n, N))\npylab.xlabel('toss')\npylab.ylabel('probability')\npylab.plot(range(1,(N+1)), probs, 'o')\npylab.show()\n</code></pre>\n", "\n\n<p>Let</p>\n\n<ul>\n<li>$x$ be the top end of your range, $x=100$ in your case.</li>\n<li>$n$ be the total number of draws, $n=25$ in your case.</li>\n</ul>\n\n<p>For any number $y\\\\le x$, the number of sequences of $n$ numbers with each number in the sequence $\\\\le y$ is $y^n$. Of these sequence, the number containing no $y$s is $(y-1)^n$, and the number containing one $y$ is $n(y-1)^{n-1}$. Hence the number of sequences with two or more $y$s is\n$$y^n - (y-1)^n - n(y-1)^{n-1}$$\nThe total number of sequences of $n$ numbers with highest number $y$ containing at least two $y$s is\n\\\\begin{align}\n\\\\sum_{y=1}^x \\\\left(y^n - (y-1)^n - n(y-1)^{n-1}\\\\right)\n&amp;= \\\\sum_{y=1}^x y^n - \\\\sum_{y=1}^n(y-1)^n - \\\\sum_{y=1}^nn(y-1)^{n-1}\\\\\\\\\n&amp;= x^n - n\\\\sum_{y=1}^x(y-1)^{n-1}\\\\\\\\\n&amp;= x^n - n\\\\sum_{y=1}^{x-1}y^{n-1}\\\\\\\\\n\\\\end{align}</p>\n\n<p>The total number of sequences is simply $x^n$. All sequences are equally likely and so the probability is\n$$ \\\\frac{x^n - n\\\\sum_{y=1}^{y=x-1}y^{n-1}}{x^n}$$</p>\n\n<p>With $x=100,n=25$ I make the probability 0.120004212454.</p>\n\n<p>I've tested this using the following Python program, which counts the sequences that match manually (for low $x,n$), simulates and calculates using the above formula.</p>\n\n<pre class=\"lang-python prettyprint-override\"><code>import itertools\nimport numpy.random as np\n\ndef countinlist(x, n):\n    lst = list(itertools.product(range(1,x+1), repeat=n))\n\n    count = 0\n    for perm in lst:\n        if perm.count(max(perm)) &gt; 1:\n            count += 1\n\n    print \"Counting: x\", x, \"n\", n, \"total\", len(lst), \"count\", count\n\ndef simulate(x,n,N):\n    count = 0\n    for i in range(N):\n        perm = np.randint(x, size=n)\n        m = max(perm)\n        if sum(perm==m) &gt; 1:\n            count += 1\n    print \"Simulation: x\", x, \"n\", n, \"total\", N, \"count\", count, \"prob\", count/float(N)\n\nx=100\nn=25\nN = 1000000 # number of trials in simulation\n\n#countinlist(x,n) # only call this for reasonably small x and n!!!!\nsimulate(x,n,N)\nformula = x**n - n*sum([i**(n-1) for i in range(x)])\nprint \"Formula count\", formula, \"out of\", x**n, \"probability\", float(formula) / x**n\n</code></pre>\n\n<p>This program outputted</p>\n\n<pre class=\"lang-python prettyprint-override\"><code>Simulation: x 100 n 25 total 1000000 count 120071 prob 0.120071\nFormula count 12000421245360277498241319178764675560017783666750 out of 100000000000000000000000000000000000000000000000000 probability 0.120004212454\n</code></pre>\n", "\n\n<p>Yes it is possible to do better than returning the average of all the vectors. Let $X=[\\\\mathbf{x_1},\\\\ldots,\\\\mathbf{x_k}]$, where $\\\\mathbf{x_i}$ is the $i$th vector, of length $n$ (note I've written $\\\\mathbf{x_i}$ where you wrote $x^i$). The vector of weighted row means of $X$, i.e. $\\\\sum_{i=1}^nw_i\\\\mathbf{x_i} \\\\text{ s.t. } \\\\sum_{i=1}^nw_i=1$, is an unbiased estimator of $\\\\mathbf{x}$. The variance of each element of this estimator vector is proportional to the sum of the variance of the $x_k$s, i.e. $\\\\propto \\\\sum_{i=1}^nw_i^2\\\\sigma_i^2$. This sum can be minimized, as shown below, so the key part of the problem is estimating the $\\\\sigma_i^2$s.</p>\n\n<p>I have chosen a very simple method of estimating the $\\\\sigma_i^2$s, namely first to estimate $\\\\mathbf{x}$ based on equal weights $w_i=1/k$ and then subtract this from each $\\\\mathbf{x_i}$ so that the estimate of the variance $\\\\sigma^2_i$ is $s^2_i=\\\\mathrm{Var}(\\\\mathbf{x_i}-\\\\overline{\\\\mathbf{x_i}})$. As well as being simple, this method has the benefit that the estimated variances are trivially greater than zero! (I considered other methods to estimate $\\\\mathrm{Var}(\\\\mathbf{x})$ by taking differences between variances and ran into various problems. I wasn't convinced that a more complex estimation method is justified although I would love to hear otherwise.)</p>\n\n<p>The variance of the weighted sum of columns $\\\\sum_{i=1}^nw_i^2\\\\sigma_i^2$ can be estimated with $\\\\sum_{i=1}^nw_i^2s_i^2$. Given $w_k=1-\\\\sum_i^{k-1}w_i$, the parameters to be minimized are $w_1,\\\\ldots,w_{k-1}$ with a cost function\n$$ C = \\\\sum_i^{k-1}w_i^2s_i^2 + \\\\left(1 - \\\\sum_{i=1}^{n-1}w_i\\\\right)^2s_k^2$$\nThe gradient is given by\n$$ \\\\frac{\\\\partial C}{\\\\partial w_i} = 2w_is_i^2 - 2\\\\left(1 - \\\\sum_{i=1}^{n-1}w_i\\\\right)s^2_k$$</p>\n\n<p>This can be incorporated into a simple program, as in the R code below. For simplicity and ease of demonstration, in this program $\\\\mathbf{x} = (1,2,\\\\ldots,n)$, and the $\\\\sigma$s are also set to some increasing function.</p>\n\n<pre class=\"lang-R prettyprint-override\"><code># Generate random matrix X\nset.seed(0)\nk=100\nn=10\nx=1:n\nsigma=(1:n) # interesting to try other functions, e.g. sqrt(1:n) or (1:n)^2\nX=matrix(rnorm(k*n, rep(x,k), rep(sigma,each=k)), n,k)\n\n# Estimate column variances\nvars=apply(X-apply(X,1,mean), 2, var)\n\n# Estimate means and errors with equal weights\nallwgt= rep(1/k,k)\npred= X %*% allwgt\nprederr = X %*% allwgt - x\n\n# Estimate means and errors by minimizing weighted sum of column variances\nwgtvar=function(wgt,vars)\n  {\n    allwgt=c(wgt,1-sum(wgt))\n    sum(allwgt^2 * vars)\n  }\nwgtvargr=function(wgt,vars)\n  {\n    2*(wgt*vars[1:length(wgt)] - 2*(1-sum(wgt))*vars[length(wgt)+1])\n  }\nwgt=rep(1/k,k-1) # initial weights are equal\noptresgr=optim(wgt, wgtvar, vars=vars,method=\"BFGS\",gr=wgtvargr)\nalloptgrwgt=c(optresgr$par,1-sum(optresgr$par))\npredoptgr = X %*% alloptgrwgt\npredoptgrerr = X %*% alloptgrwgt - x\n\n# Plot results\npar(mfrow=c(2,1))\nplot(prederr^2 ~ x, ylab=\"Squared error\")\npoints(predoptgrerr^2 ~ x, col=\"green\")\nplot(allwgt,ylab=\"Weights\",ylim=c(0,max(allwgt,alloptgrwgt)))\npoints(alloptgrwgt, col=\"green\")\n</code></pre>\n\n<p>The errors and weights are compared in the plot below, with black for the equal weights and green for the optimized weights.</p>\n\n<p><img src=\"http://i.stack.imgur.com/S7TWb.jpg\" alt=\"enter image description here\"></p>\n\n<p>As you can see, the optimized weights produce a better distribution of errors, and, in general, higher weights $w_i$ correspond to lower variances $\\\\sigma_i^2$. The reduction in errors with optimized weights is more pronounced as the $\\\\sigma_i$s are increased, e.g. by setting <code>sigma=(1:n)^2</code> in the above program.</p>\n", "\"A rule, method, or criterion for arriving at an estimate of the value of a parameter.\"", "\"Analysis\" is too generic for this site: please select a more precise term.", "\"Generalized least squares (GLS) is a technique for estimating the unknown parameters in a linear regression model. The GLS is applied when the variances of the observations are unequal (heteroscedasticity), or when there is a certain degree of correlation between the observations.\" [Wikipedia]", "\"Given certain conditions, the mean of a sufficiently large number of iterates of independent random variables, each with a well-defined mean and well-defined variance, will be approximately normally distributed\" ([Wikipedia](http://en.wikipedia.org/wiki/Central_limit_theorem)).", "\"JAGS is Just Another Gibbs Sampler.  It is a program for analysis of Bayesian hierarchical models using Markov Chain Monte Carlo (MCMC) simulation  not wholly unlike BUGS.\" (http://mcmc-jags.sourceforge.net/)"]
