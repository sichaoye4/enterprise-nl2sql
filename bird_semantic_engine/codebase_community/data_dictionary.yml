        sample_values: ["", "\t   \\\\n\tdfuller Demand\\\\n\\\\nDickey-Fuller test for unit root                   Number of obs   =        50\\\\n\\\\n                  ---------- Interpolated Dickey-Fuller ---------\\\\n                Test         1% Critical       5% Critical     10% Critical\\\\n             Statistic         Value            Value           Value      \\\\n       -------------------------------------------------------------------\\\\n    Z(t)           -14.272            -4.380            -3.600            -3.240\\\\n       -------------------------------------------------------------------\\\\n\\\\n\\\\n          MacKinnon approximate p-value for Z(t) = 0.0000", "\tBioE\tCEE\tEECS\tIEOR\tME\tMSE\tNE\tOther\\\\nStudents\t119\t101\t341\t45\t175\t36\t11\t40\\\\nGifts\t46\t65\t106\t24\t80\t18\t4\t14\\\\n\t\t\t\t\t\t\t\t\\\\n\t39%\t64%\t31%\t53%\t46%\t50%\t36%\t35%\\\\n\\\\nI am trying to normalize the percent data from each of these eight student groups (the percentages measure participation per group in a campus program). I am not a mathematician, obviously, so I hope my description of the problem makes sense. This data represents participation in the program and the students who have the highest participation by percent of their population in the group win a prize. They asked us to normalize the data because, as you can see, one of the student groups has 341 students and another has ony 11. Any help you can give will be very much appreciated and may keep a riot from breaking out among the winners/losers!", "\tC <- 10000 #Constant 1/0 trick\\\\n\t\\\\n\t# Likelihood:\\\\n\tfor ( i in 1:ny ) {\\\\n\\\\n\t#Likelihood of the count model component\\\\n\tLikCountModel[i] <- pow(mu[i],y[i])/y_fact[i]*exp(-mu[i])\\\\n\\\\n\t#Count model component\\\\n\teta[i] <- bet0 + inprod( beta[] , B[i,] )\\\\n\tmu[i] <- exp(eta[i])\\\\n\t\\\\n\t#ZI Component\\\\n\tzeta[i] <- gamm0 + inprod( gamma[] , G[i,] )\\\\n\tw[i] <- exp(zeta[i])/(1+exp(zeta[i]))\\\\n\t\\\\n\t#1/0 Tricks: ones is a column containing only ones, with the same size of y\\\\n      p[i] <- L[i] / C\\\\n      ones[i] ~ dbern(p[i])\\\\n\t\\\\n\t#Full likelihood expression\\\\n\tL[i] <- LikCountModel[i] * (1-w[i]) + equals(y[i],0)*w[i]\\\\n\t}\\\\n\\\\n    #then set your priors for all beta and gamma\\\\n\\\\n", "\t\\\\n**Hint**: since $a$ and $b$ are constants, you can compute the mean and variance of $Y$ in terms of $a$, $b$, and what you have already established. That gives two easily-solved equations in two unknowns.", "\t\\\\n**Hint**: since $a$ and $b$ are constants, you can compute the mean and variance of $Y$ in terms of $a$, $b$, and what you have already established. That gives two easily-solved equations in two unknowns.\\\\n\\\\n###Edit###\\\\n\\\\nNow that the answer has been sketched in comments, I will sketch it here for completeness.  The general setting in which this works is one in which $(x_1, x_2, \\\\ldots, x_M)$ has an $M$-variate distribution with finite first and second moments (namely, its expectation $(\\\\mu_i)$ and covariance matrix $\\\\Sigma_{ij}$).  (That is, they do not have to be uniform--indeed they do not have to have a common distribution--and they can be dependent.)  Using the most basic properties of expectation and variance, we compute\\\\n\\\\n$$Var(Y) = Var(a(x_1 + \\\\ldots + x_M) + b) = a^2\\\\sum_{i=1}^M\\\\sum_{j=1}^M \\\\text{Covar}(x_i,x_j) = a^2\\\\sum_{i,j}\\\\Sigma_{ij}$$\\\\n\\\\nand\\\\n\\\\n$$\\\\mathbb{E}[Y] = a(\\\\mu_1 + \\\\mu_2 + \\\\ldots + \\\\mu_M) + b = a\\\\mu + b.$$\\\\n\\\\nWe can therefore make the variance equal to unity by setting $a = \\\\left(\\\\sum_{i,j=1}^M\\\\Sigma_{ij}\\\\right)^{-1/2}$ and zero out the mean by setting $b = -a\\\\mu$.  This can always be done provided $Y$ isn't degenerate (that is, constantly equal to a single value, in which case $\\\\sum_{i,j}\\\\Sigma_{ij}=0$).\\\\n\\\\nA special case is when the $x_i$ have a common uniform distribution supported on $[0,1]$ and are independent.  Here, $\\\\mu_i = 1/2$ implies $\\\\mu=M/2$ and $\\\\Sigma_{ij} = (1/{12})\\\\delta_{ij}$ implies $\\\\sum_{i,j}\\\\Sigma_{ij} = M/{12}$, whence $a = \\\\sqrt{12/M}$ and $b = -a\\\\mu$ $=-\\\\sqrt{M/12}$.", "\t\\\\nA $(1\u2212\\\\alpha)$ level confidence interval is exactly the range of values that would not be rejected using an $\\\\alpha$ level test, assuming the same general theory generated the confidence interval and the hypothesis test decision. Therefore, they are exactly equivalent in terms of the decision about whether or not to reject the null hypothesis.", "\t\\\\nA $(1\u2212\\\\alpha)$ level confidence interval is exactly the range of values that would not be rejected using an $\\\\alpha$ level test, assuming the same general theory generated the confidence interval and the hypothesis test decision. Therefore, they are exactly equivalent in terms of the overall decision that is made."]
