        sample_values: ["\n\n\n\n\n\n\n", "\n\n<blockquote>\n  <p>No, his mind is not for rent<br>\n    to any god or government.<br>\n    Always hopeful, yet discontent.<br>\n    He knows changes aren't permanent,<br>\n    but change is.</p>\n</blockquote>\n\n<p>\u2014 Rush, <em>Tom Sawyer</em></p>\n\n<hr>\n\n<p>Taking an externally-imposed and much-needed break from SE activities.</p>\n\n<p>E-mail (flipped ROT13): zqd\u02d9\u028e\u028cuz\u0287@\u0287\u0250\u028c\u01dd\u0265\u0287\u028cssq\u0279\u01dd\u0265\u025fu\u0279\u028e\u0254<br>\nAny code I've posted here I place under the <a href=\"http://www.wtfpl.net/\" rel=\"nofollow\">WTFPL</a>.</p>\n", "\n\n<h2>Area 51</h2>\n\nMy proposals:\n\n<ul>\n<li><a href=\"http://area51.stackexchange.com/proposals/60092/horror\">Horror</a> </li>\n<li><a href=\"http://area51.stackexchange.com/proposals/60723/comic-books-and-graphic-novels\">Comics</a></li>\n</ul>\n\n<h2>Other Links</h2>\n\n<ul>\n<li><p>Stack Exchange is now openly publishing the <a href=\"http://meta.stackexchange.com/questions/177269/please-upload-dmca-takedowns-to-the-chilling-effects-clearinghouse\">DMCA Notices</a> they receive on <a href=\"https://www.chillingeffects.org\" rel=\"nofollow\">Chilling Effects</a>.</p></li>\n<li><p><a href=\"http://blog.stackoverflow.com/2010/01/stack-overflow-where-we-hate-fun/\">We Hate Fun</a></p></li>\n<li><p><a href=\"http://www.w3fools.com/\" rel=\"nofollow\">W3Fools - A W3Schools Intervention</a></p></li>\n</ul>\n\n<h2>XKCD</h2>\n\n<p><a href=\"http://xkcd.com/1244/\" rel=\"nofollow\"><img src=\"http://imgs.xkcd.com/comics/six_words.png\" /></a></p>\n\n<p><a href=\"https://xkcd.com/1316/\" rel=\"nofollow\"><img src=\"http://imgs.xkcd.com/comics/inexplicable.png\" /></a></p>\n\n<p><a href=\"https://xkcd.com/1319/\" rel=\"nofollow\"><img src=\"http://imgs.xkcd.com/comics/automation.png\" /></a></p>\n", "\n\n<p>\n</p>\n\n<ul>\n<li><a href=\"http://www.linkedin.com/in/calebsotelo\" rel=\"nofollow\">LinkedIn Profile</a></li>\n<li><a href=\"http://paislee.io\" rel=\"nofollow\">Personal Website</a></li>\n<li>I will not do your homework for money.</li>\n</ul>\n\n<p></p>\n", "\n\n<p><a href=\"http://puzzling.stackexchange.com/tour\">Moderator for Puzzling.SE</a></p>\n\n<p>They told me I should write something here, so this is what I had to say. </p>\n\n<p>\u65e5\u672c\u8a9e\u3092\u52c9\u5f37\u3059\u308b\u3002</p>\n\n<p>\"Truly! Twas Gimoneus the wise, grand sorcerer of Elantorfan, keeper of the ancient rune of Turgochit, came nearest to slaying the mighty dragon of Ralmorgantorg; for he was old and sinewy, and the wretched beast near choked to death on his femur.\"</p>\n", "\n\n<p><a href=\"http://stackexchange.com/users/1532428/greg-e\"><img src=\"http://stackexchange.com/users/flair/1532428.png\" width=\"208\" height=\"58\" alt=\"profile for Greg E. on Stack Exchange, a network of free, community-driven Q&amp;A sites\" title=\"profile for Greg E. on Stack Exchange, a network of free, community-driven Q&amp;A sites\" /></a></p>\n\n<p>Undergraduate student double-majoring in chemistry and computer science. Primarily interested in chemoinformatics/computational chemistry. I work part-time as a freelance web developer, general and organic chemistry TA, and math and science tutor.</p>\n\n<p>A partial and unordered list of some of my favorite things:</p>\n\n<ul>\n<li>The caffeine molecule.</li>\n<li>Euler's formula.</li>\n<li>The Weierstrass substitution.</li>\n<li>Laplace transforms.</li>\n<li>Fourier transforms.</li>\n<li>Diagonal matrices.</li>\n<li>The novels of Kurt Vonnegut.</li>\n<li>Chiral auxiliaries.</li>\n<li>Pie.</li>\n</ul>\n", "\n\n<p>Ben Duguid works in London, UK as a Technical Lead for <a href=\"http://www.thebioagency.com/\" rel=\"nofollow\">The BIO Agency</a>, mostly delivering web sites on various Microsoft based platforms.</p>\n\n<p>He has run internal training sessions helping other developers get up to speed in the technologies he knows about, and tries hard to get others to do the same.</p>\n\n<p>For what it's worth he is an MCPD in ASP.NET 3.5, and is currently a Pro-Tem Mod on <a href=\"http://bricks.stackexchange.com/\">LEGO Answers</a></p>\n\n<ul>\n<li><a href=\"http://www.doodle.co.uk/Blogs.aspx\" rel=\"nofollow\">Blog</a></li>\n<li><a href=\"http://twitter.com/zhaph\" rel=\"nofollow\">Twitter</a></li>\n<li><a href=\"https://plus.google.com/+BenDuguid/\" rel=\"nofollow\">Google+</a></li>\n</ul>\n", "\n\n<p>Full-time Internet. Gamer. Developer @ Stack Exchange.</p>\n\n<p>Formerly a <a href=\"http://meta.stackexchange.com/questions/99338/who-are-the-community-managers-and-what-do-they-do\">community manager</a> and elected moderator on Stack Overflow/Programmers Stack Exchange.</p>\n\n<p>Email me and tell me something interesting: <code>anna@stackexchange.com</code>.</p>\n"]
